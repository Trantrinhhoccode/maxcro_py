name: Macro Bot

on:
  workflow_dispatch:
  schedule:
    # Giờ VN (UTC+7): 09:00 và 18:00
    # GitHub cron dùng UTC => 09:00 VN = 02:00 UTC, 18:00 VN = 11:00 UTC
    - cron: "0 2,11 * * *"

permissions:
  contents: read
  actions: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sent news (run trước)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: macro-bot.yml
          name: sent-news
          path: .
          search_artifacts: true
          if_no_artifact_found: ignore

      - name: Download watchlist (run trước)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: macro-bot.yml
          name: watchlist
          path: .
          search_artifacts: true
          if_no_artifact_found: ignore

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run collector (cào + tạo candidates)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SENT_NEWS_FILE: sent_news.json
          WATCHLIST_FILE: watchlist.json
          TELEGRAM_COMMANDS: "1"
          # Tuỳ chọn
          LOOKBACK_DAYS: "30"
          RECENT_DAYS: "3"
          SCAN_PER_FEED: "200"
          MAX_SEND_PER_STOCK: "3"
          # Collector tạo nhiều hơn quota một chút để analyzer có cơ hội đủ tin.
          MAX_CANDIDATES_PER_STOCK: "9"
          CANDIDATES_FILE: candidates.ndjson
          GENAI_MODEL: "gemma-3-27b-it"
        run: |
          python macro_bot_collect.py

      - name: Upload candidates artifact
        uses: actions/upload-artifact@v4
        with:
          name: candidates
          path: candidates.ndjson
          if-no-files-found: ignore

      - name: Upload watchlist artifact
        uses: actions/upload-artifact@v4
        with:
          name: watchlist
          path: watchlist.json
          if-no-files-found: ignore

  analyze:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sent news (run trước)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: macro-bot.yml
          name: sent-news
          path: .
          search_artifacts: true
          if_no_artifact_found: ignore

      - name: Download candidates
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: macro-bot.yml
          name: candidates
          path: .
          search_artifacts: true
          if_no_artifact_found: ignore

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analyzer (phân tích + gửi Telegram)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SENT_NEWS_FILE: sent_news.json
          # Tuỳ chọn
          LOOKBACK_DAYS: "30"
          RECENT_DAYS: "3"
          SCAN_PER_FEED: "200"
          MAX_SEND_PER_RUN: "50"
          MAX_SEND_PER_STOCK: "3"
          CANDIDATES_FILE: candidates.ndjson
          GENAI_MODEL: "gemma-3-27b-it"
          TELEGRAM_COMMANDS: "0"
        run: |
          python macro_bot_analyze.py

      - name: Upload sent news artifact
        uses: actions/upload-artifact@v4
        with:
          name: sent-news
          path: sent_news.json
          if-no-files-found: ignore
